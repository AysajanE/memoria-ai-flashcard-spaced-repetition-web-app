name: Next.js App CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['nextjs-app/**', '.github/workflows/ci.yml']
  pull_request:
    branches: [main, develop] 
    paths: ['nextjs-app/**', '.github/workflows/ci.yml']
  workflow_dispatch:

env:
  # Node.js version to use across all jobs
  NODE_VERSION: '20'
  # CI-specific environment variables
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ================================
  # Job 1: Code Quality & Unit Tests
  # ================================
  unit-tests:
    name: Unit Tests & Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nextjs-app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memoria_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment variables
        run: |
          cat > .env.local << EOF
          # CI Test Environment Variables
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/memoria_test_db"
          NEXT_PUBLIC_APP_URL="http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_test_test"
          CLERK_SECRET_KEY="sk_test_test"
          CLERK_WEBHOOK_SECRET="whsec_test_secret"
          AI_SERVICE_BASE_URL="http://localhost:8000"
          INTERNAL_API_KEY="test_internal_key"
          INTERNAL_WEBHOOK_HMAC_SECRET="test_webhook_secret_for_ci"
          NEXT_PUBLIC_SUPABASE_URL="https://test.supabase.co"
          SUPABASE_SERVICE_KEY="test_supabase_key"
          UPLOADS_BUCKET_NAME="test-uploads"
          STRIPE_SECRET_KEY="sk_test_test"
          STRIPE_WEBHOOK_SECRET="whsec_test"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_test"
          EOF

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_test_db

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Verify import boundaries
        run: npm run verify:imports

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_test_db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: success()
        with:
          file: ./nextjs-app/coverage/lcov.info
          fail_ci_if_error: false

  # ============================
  # Job 2: Integration Tests
  # ============================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: ./nextjs-app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memoria_integration_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup integration test environment
        run: |
          cat > .env.local << EOF
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/memoria_integration_db"
          NEXT_PUBLIC_APP_URL="http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_test_integration"
          CLERK_SECRET_KEY="sk_test_integration"
          CLERK_WEBHOOK_SECRET="whsec_integration_test"
          AI_SERVICE_BASE_URL="http://localhost:8000"
          INTERNAL_API_KEY="integration_test_key"
          INTERNAL_WEBHOOK_HMAC_SECRET="integration_webhook_secret"
          NEXT_PUBLIC_SUPABASE_URL="https://integration.supabase.co"
          SUPABASE_SERVICE_KEY="integration_supabase_key"
          UPLOADS_BUCKET_NAME="integration-uploads"
          STRIPE_SECRET_KEY="sk_test_integration"
          STRIPE_WEBHOOK_SECRET="whsec_integration"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_integration"
          EOF

      - name: Run database migrations for integration
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_integration_db

      - name: Run integration tests
        run: npm run ci:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_integration_db

  # =======================
  # Job 3: Build & Analyze
  # =======================
  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: ./nextjs-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup build environment variables
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_APP_URL="http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_test_build"
          CLERK_SECRET_KEY="sk_test_build"
          DATABASE_URL="postgresql://build:build@localhost:5432/build_db"
          AI_SERVICE_BASE_URL="http://localhost:8000"
          INTERNAL_API_KEY="build_test_key"
          NEXT_PUBLIC_SUPABASE_URL="https://build.supabase.co"
          SUPABASE_SERVICE_KEY="build_supabase_key"
          UPLOADS_BUCKET_NAME="build-uploads"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_build"
          EOF

      - name: Build application
        run: npm run build

      - name: Analyze bundle size
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Build completed successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          if [ -f ".next/analyze/bundle-analyzer-report.json" ]; then
            echo "Bundle analyzer report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: next-build-${{ github.sha }}
          path: |
            ./nextjs-app/.next/static
            ./nextjs-app/.next/standalone
          retention-days: 7

  # ========================
  # Job 4: End-to-End Tests
  # ========================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./nextjs-app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memoria_e2e_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup E2E test environment
        run: |
          cat > .env.local << EOF
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/memoria_e2e_db"
          NEXT_PUBLIC_APP_URL="http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_test_e2e"
          CLERK_SECRET_KEY="sk_test_e2e"
          CLERK_WEBHOOK_SECRET="whsec_e2e_test"
          AI_SERVICE_BASE_URL="http://localhost:8000"
          INTERNAL_API_KEY="e2e_test_key"
          INTERNAL_WEBHOOK_HMAC_SECRET="e2e_webhook_secret_for_testing"
          NEXT_PUBLIC_SUPABASE_URL="https://e2e.supabase.co"
          SUPABASE_SERVICE_KEY="e2e_supabase_key"
          UPLOADS_BUCKET_NAME="e2e-uploads"
          STRIPE_SECRET_KEY="sk_test_e2e"
          STRIPE_WEBHOOK_SECRET="whsec_e2e"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_e2e"
          EOF

      - name: Run database migrations for E2E
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_e2e_db

      - name: Seed test data (if available)
        run: |
          if [ -f "scripts/seed-test-data.mjs" ]; then
            node scripts/seed-test-data.mjs
          else
            echo "No test data seeding script found - skipping"
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_e2e_db

      - name: Run E2E tests
        run: npm run ci:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoria_e2e_db

      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results-${{ github.sha }}
          path: |
            ./nextjs-app/test-results/
            ./nextjs-app/playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: e2e-screenshots-${{ github.sha }}
          path: ./nextjs-app/test-results/
          retention-days: 3

  # =============================
  # Job 5: Security & Performance
  # =============================
  security-audit:
    name: Security & Performance Audit
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: ./nextjs-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for package vulnerabilities
        run: |
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY || true

      - name: Check bundle size limits
        run: |
          if [ -f ".next/static/chunks/pages/_app.js" ]; then
            APP_SIZE=$(stat -f%z .next/static/chunks/pages/_app.js 2>/dev/null || echo "0")
            echo "App bundle size: $APP_SIZE bytes" >> $GITHUB_STEP_SUMMARY
            if [ "$APP_SIZE" -gt 500000 ]; then
              echo "⚠️ App bundle size exceeds 500KB" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # ===============================
  # Job 6: Deployment Readiness
  # ===============================
  deployment-check:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build, e2e-tests]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./nextjs-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: next-build-${{ github.sha }}
          path: ./nextjs-app/.next

      - name: Verify deployment readiness
        run: |
          echo "## 🚀 Deployment Readiness Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for required files
          if [ -f ".next/static/chunks/pages/_app.js" ]; then
            echo "✅ App bundle generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ App bundle missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Check for critical environment variables documentation
          if [ -f ".env.example" ]; then
            echo "✅ Environment variables documented" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ .env.example missing" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Database migration check
          if [ -f "drizzle/meta/_journal.json" ]; then
            echo "✅ Database migrations ready" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No database migrations found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All deployment checks passed!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Ensure production environment variables are configured" >> $GITHUB_STEP_SUMMARY
          echo "2. Run database migrations in production" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy to your hosting platform" >> $GITHUB_STEP_SUMMARY

  # ===========================
  # Job 7: Summary & Reporting
  # ===========================
  report:
    name: CI Summary Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build, e2e-tests, security-audit]
    if: always()

    steps:
      - name: Generate CI Summary
        run: |
          echo "## 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests & Code Quality: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY  
          echo "- Build & Bundle Analysis: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests (Playwright): ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security & Performance Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [[ "${{ needs.unit-tests.result }}" == "success" && 
                "${{ needs.integration-tests.result }}" == "success" && 
                "${{ needs.build.result }}" == "success" && 
                "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "## ✅ **All Critical Checks Passed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🚀 This build is ready for deployment!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ **Some Checks Failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed jobs and fix any issues before deploying." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by Memoria AI CI Pipeline*" >> $GITHUB_STEP_SUMMARY