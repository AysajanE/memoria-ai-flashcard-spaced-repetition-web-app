<?xml version="1.0" encoding="UTF-8"?>
<svg width="500px" height="500px" viewBox="0 0 500 500" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Brain Neural Network</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="neuralGradient">
            <stop stop-color="#6366F1" offset="0%"></stop>
            <stop stop-color="#9F7AEA" offset="50%"></stop>
            <stop stop-color="#EC4899" offset="100%"></stop>
        </linearGradient>
        <filter x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" id="glow">
            <feGaussianBlur stdDeviation="5" in="SourceGraphic"></feGaussianBlur>
        </filter>
    </defs>
    <g stroke="none" fill="none">
        <!-- Brain outline -->
        <path d="M250,80 C340,80 420,160 420,250 C420,340 340,420 250,420 C160,420 80,340 80,250 C80,160 160,80 250,80 Z" stroke="url(#neuralGradient)" stroke-width="4" opacity="0.8"></path>
        
        <!-- Neural nodes -->
        <circle cx="250" cy="140" r="12" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="180" cy="170" r="10" fill="url(#neuralGradient)" opacity="0.8"></circle>
        <circle cx="320" cy="170" r="10" fill="url(#neuralGradient)" opacity="0.8"></circle>
        <circle cx="150" cy="220" r="14" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="350" cy="220" r="14" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="200" cy="250" r="12" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="300" cy="250" r="12" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="250" cy="280" r="16" fill="url(#neuralGradient)" opacity="1"></circle>
        <circle cx="180" cy="320" r="10" fill="url(#neuralGradient)" opacity="0.8"></circle>
        <circle cx="320" cy="320" r="10" fill="url(#neuralGradient)" opacity="0.8"></circle>
        <circle cx="220" cy="350" r="14" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="280" cy="350" r="14" fill="url(#neuralGradient)" opacity="0.9"></circle>
        <circle cx="250" cy="380" r="12" fill="url(#neuralGradient)" opacity="0.8"></circle>
        
        <!-- Connection lines -->
        <line x1="250" y1="140" x2="180" y2="170" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="250" y1="140" x2="320" y2="170" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="180" y1="170" x2="150" y2="220" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="320" y1="170" x2="350" y2="220" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="150" y1="220" x2="200" y2="250" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="350" y1="220" x2="300" y2="250" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="200" y1="250" x2="250" y2="280" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="300" y1="250" x2="250" y2="280" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="250" y1="280" x2="180" y2="320" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="250" y1="280" x2="320" y2="320" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="180" y1="320" x2="220" y2="350" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="320" y1="320" x2="280" y2="350" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="220" y1="350" x2="250" y2="380" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        <line x1="280" y1="350" x2="250" y2="380" stroke="url(#neuralGradient)" stroke-width="2" opacity="0.6"></line>
        
        <!-- Cross connections -->
        <line x1="180" y1="170" x2="320" y2="170" stroke="url(#neuralGradient)" stroke-width="1.5" opacity="0.4"></line>
        <line x1="150" y1="220" x2="350" y2="220" stroke="url(#neuralGradient)" stroke-width="1.5" opacity="0.4"></line>
        <line x1="200" y1="250" x2="300" y2="250" stroke="url(#neuralGradient)" stroke-width="1.5" opacity="0.4"></line>
        <line x1="180" y1="320" x2="320" y2="320" stroke="url(#neuralGradient)" stroke-width="1.5" opacity="0.4"></line>
        <line x1="220" y1="350" x2="280" y2="350" stroke="url(#neuralGradient)" stroke-width="1.5" opacity="0.4"></line>
        
        <!-- Diagonal connections -->
        <line x1="180" y1="170" x2="350" y2="220" stroke="url(#neuralGradient)" stroke-width="1" opacity="0.3"></line>
        <line x1="320" y1="170" x2="150" y2="220" stroke="url(#neuralGradient)" stroke-width="1" opacity="0.3"></line>
        <line x1="200" y1="250" x2="320" y2="320" stroke="url(#neuralGradient)" stroke-width="1" opacity="0.3"></line>
        <line x1="300" y1="250" x2="180" y2="320" stroke="url(#neuralGradient)" stroke-width="1" opacity="0.3"></line>
        
        <!-- Glow effects -->
        <circle cx="250" cy="140" r="20" fill="url(#neuralGradient)" opacity="0.3" filter="url(#glow)"></circle>
        <circle cx="250" cy="280" r="24" fill="url(#neuralGradient)" opacity="0.3" filter="url(#glow)"></circle>
        <circle cx="250" cy="380" r="20" fill="url(#neuralGradient)" opacity="0.3" filter="url(#glow)"></circle>
    </g>
</svg>